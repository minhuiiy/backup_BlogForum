<div class="fixed inset-0 z-50 flex items-center justify-center p-4 sm:p-8 bg-surface-container-highest/80 backdrop-blur-md">
  <div class="bg-surface-container-lowest w-full max-w-md rounded-3xl shadow-2xl overflow-hidden flex flex-col ghost-border relative animate-fade-in">
    
    <button class="absolute top-4 right-4 w-8 h-8 rounded-full flex items-center justify-center bg-surface-container hover:bg-surface-container-high transition-colors text-on-surface-variant z-10" (click)="close()">
      <span class="material-symbols-outlined text-[18px]">close</span>
    </button>

    <div class="p-8 sm:p-10">
      <div class="mb-8">
        <h2 class="text-3xl font-bold font-headline text-on-surface mb-2">Đăng nhập</h2>
        <p class="text-xs text-on-surface-variant font-medium leading-relaxed">
          Bằng việc tiếp tục, bạn đồng ý với <a href="#" class="text-primary hover:underline">Thỏa thuận người dùng</a> của chúng tôi, đồng thời xác nhận rằng
          bạn hiểu rõ <a href="#" class="text-primary hover:underline">Chính sách quyền riêng tư</a> của chúng tôi.
        </p>
      </div>

      <!-- Social Logins -->
      <div class="space-y-3 mb-6">
        <div class="flex justify-center w-full bg-surface-container hover:bg-surface-container-high transition-colors rounded-full overflow-hidden border border-outline-variant/30 py-1">
          <asl-google-signin-button type="standard" size="large" shape="pill" [width]="360" text="continue_with"></asl-google-signin-button>
        </div>
      </div>

      <div class="flex items-center gap-4 mb-6">
        <div class="flex-1 h-[1px] bg-outline-variant/20"></div>
        <span class="text-[10px] font-bold text-on-surface-variant uppercase tracking-widest">Hoặc</span>
        <div class="flex-1 h-[1px] bg-outline-variant/20"></div>
      </div>

      <!-- Traditional Login -->
      <form name="form" (ngSubmit)="f.form.valid && onSubmit()" #f="ngForm" novalidate>
        <div class="space-y-4">
          
          <div>
            <input type="text" id="username" name="username" [(ngModel)]="form.username" required #username="ngModel"
                   placeholder="Email hoặc tên người dùng *"
                   class="w-full bg-surface border border-outline-variant/30 focus:border-primary focus:ring-2 focus:ring-primary/20 rounded-xl px-4 py-3 font-bold text-on-surface outline-none transition-all"
                   [ngClass]="{ 'border-error focus:border-error focus:ring-error/20': f.submitted && username.errors }" autocomplete="off" />
          </div>

          <div>
            <input type="password" id="password" name="password" [(ngModel)]="form.password" required minlength="6" #password="ngModel"
                   placeholder="Mật khẩu *"
                   class="w-full bg-surface border border-outline-variant/30 focus:border-primary focus:ring-2 focus:ring-primary/20 rounded-xl px-4 py-3 font-bold text-on-surface outline-none transition-all"
                   [ngClass]="{ 'border-error focus:border-error focus:ring-error/20': f.submitted && password.errors }" autocomplete="off" />
          </div>

          <div class="text-right">
            <a href="#" class="text-xs font-bold text-primary hover:underline tracking-wide">Bạn quên mật khẩu?</a>
          </div>

          <div class="pt-2">
            <button class="w-full py-3.5 rounded-full font-bold text-sm tracking-widest kinetic-gradient text-white shadow-md hover:scale-[0.98] transition-transform uppercase disabled:opacity-50 disabled:cursor-not-allowed disabled:hover:scale-100"
                    [disabled]="!f.form.valid || !form.username || !form.password">
              Đăng nhập
            </button>
          </div>

          <div *ngIf="f.submitted && isLoginFailed" class="bg-error-container text-on-error-container px-4 py-3 rounded-xl mt-4 font-bold flex items-center gap-2 text-sm">
             <span class="material-symbols-outlined text-[18px]">error</span> {{ errorMessage }}
          </div>
          
        </div>
      </form>
      
      <div class="mt-8 text-center text-sm font-medium text-on-surface-variant">
        Chưa có tài khoản? <a routerLink="/register" class="font-bold text-primary hover:underline" (click)="close()">Đăng ký ngay</a>
      </div>

    </div>
  </div>
</div>
