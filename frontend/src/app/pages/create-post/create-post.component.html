<div class="max-w-[1000px] mx-auto px-8 py-10 w-full min-h-screen">
  
  <!-- Header Section -->
  <div class="flex items-center justify-between mb-8">
    <h1 class="text-3xl font-bold font-headline tracking-tight text-on-surface">Tạo bài đăng mới</h1>
    <button class="bg-surface-container text-on-surface-variant px-4 py-2 rounded-full font-bold text-sm tracking-widest uppercase hover:bg-surface-container-high transition-colors">
      Bản nháp <span class="bg-surface-container-highest px-1.5 py-0.5 rounded ml-1">0</span>
    </button>
  </div>

  <div class="h-[1px] bg-outline-variant/20 mb-8"></div>

  <!-- Real Community Picker -->
  <div class="relative w-full max-w-sm mb-8" style="z-index: 50;">
    <button type="button" class="w-full flex items-center justify-between bg-surface-container-lowest border border-outline-variant/30 hover:border-outline-variant hover:shadow-md transition-all px-4 py-3 rounded-2xl" (click)="toggleDropdown()">
      <div class="flex items-center gap-3">
        <span class="material-symbols-outlined text-[24px] text-primary" *ngIf="!selectedCommunity">public</span>
        <img *ngIf="selectedCommunity" [src]="'https://loremflickr.com/50/50/technology,startup?lock=' + selectedCommunity.name" class="w-6 h-6 rounded-full object-cover">
        <span class="font-bold text-on-surface text-sm">{{ selectedCommunity ? selectedCommunity.name : 'Chọn một cộng đồng...' }}</span>
      </div>
      <span class="material-symbols-outlined text-outline-variant transition-transform" [class.rotate-180]="showDropdown">expand_more</span>
    </button>
    
    <div class="absolute top-14 left-0 w-full bg-surface border border-outline-variant/20 rounded-2xl shadow-xl overflow-hidden" *ngIf="showDropdown">
      <div class="px-4 py-3 border-b border-outline-variant/10 text-[10px] font-bold text-on-surface-variant uppercase tracking-widest">Cộng đồng của bạn</div>
      <div class="max-h-60 overflow-y-auto">
        <button type="button" class="w-full flex items-center gap-3 px-4 py-3 hover:bg-surface-container transition-colors text-left" *ngFor="let comm of communities" (click)="selectCommunity(comm)">
          <img [src]="'https://loremflickr.com/50/50/technology,startup?lock=' + comm.name" class="w-8 h-8 rounded-xl object-cover border border-outline-variant/10">
          <div>
            <div class="font-bold text-on-surface text-sm">{{ comm.name }}</div>
            <div class="text-[10px] text-on-surface-variant uppercase tracking-wide mt-0.5">{{ comm.type === 'public' ? 'Công khai' : 'Riêng tư' }}</div>
          </div>
        </button>
      </div>
    </div>
  </div>

  <!-- Body Content -->
  <div class="w-full">
    <!-- Alerts -->
    <div class="bg-[#e8f5e9] text-[#00a843] px-4 py-3 rounded-2xl mb-6 font-bold flex items-center gap-2" *ngIf="isSuccessful">
      <span class="material-symbols-outlined">check_circle</span> Đăng bài thành công! Đang chuyển hướng...
    </div>
    <div class="bg-error-container text-on-error-container px-4 py-3 rounded-2xl mb-6 font-bold flex items-center gap-2" *ngIf="isFailed">
       <span class="material-symbols-outlined">error</span> {{ errorMessage }}
    </div>

    <form name="form" (ngSubmit)="isFormReady() && onSubmit()" #f="ngForm" novalidate *ngIf="!isSuccessful">

      <div class="bg-surface-container-lowest rounded-3xl ghost-border overflow-hidden shadow-sm">
        
        <!-- Post Tabs -->
        <div class="flex border-b border-outline-variant/15 bg-surface-container-lowest px-4">
          <button type="button" class="flex-1 py-4 font-bold text-sm transition-all focus:outline-none relative flex items-center justify-center gap-2" [class.text-primary]="activeTab === 'text'" [class.text-on-surface-variant]="activeTab !== 'text'" (click)="selectTab('text')">
            <span class="material-symbols-outlined text-[18px]">article</span> Văn bản
            <div *ngIf="activeTab === 'text'" class="absolute bottom-0 inset-x-4 h-1 bg-primary rounded-t-full"></div>
          </button>
          <button type="button" class="flex-1 py-4 font-bold text-sm transition-all focus:outline-none relative flex items-center justify-center gap-2" [class.text-primary]="activeTab === 'media'" [class.text-on-surface-variant]="activeTab !== 'media'" (click)="selectTab('media')">
            <span class="material-symbols-outlined text-[18px]">imagesmode</span> Đa phương tiện
            <div *ngIf="activeTab === 'media'" class="absolute bottom-0 inset-x-4 h-1 bg-primary rounded-t-full"></div>
          </button>
          <button type="button" class="flex-1 py-4 font-bold text-sm transition-all focus:outline-none relative flex items-center justify-center gap-2" [class.text-primary]="activeTab === 'link'" [class.text-on-surface-variant]="activeTab !== 'link'" (click)="selectTab('link')">
            <span class="material-symbols-outlined text-[18px]">link</span> Liên kết
            <div *ngIf="activeTab === 'link'" class="absolute bottom-0 inset-x-4 h-1 bg-primary rounded-t-full"></div>
          </button>
        </div>

        <div class="p-6">
          <!-- Title Box -->
          <div class="relative mb-4">
            <input type="text" id="title" name="title" [(ngModel)]="form.title" maxlength="300" required placeholder="Tiêu đề bài viết*" class="w-full bg-surface-container border border-outline-variant/20 focus:border-primary focus:ring-2 focus:ring-primary/20 rounded-xl px-4 py-3 font-bold text-on-surface outline-none transition-all pr-16" />
            <span class="absolute right-4 top-1/2 -translate-y-1/2 text-xs font-bold text-on-surface-variant">{{ titleLength }}/300</span>
          </div>

          <div class="mb-4">
            <button type="button" class="bg-surface-container-high hover:bg-surface-container text-on-surface text-xs font-bold px-3 py-1.5 rounded-full uppercase tracking-widest transition-colors flex items-center gap-1">+ Thêm thẻ chủ đề</button>
          </div>

          <!-- Editor Box -->
          <div class="rounded-xl overflow-hidden border border-outline-variant/20 focus-within:border-primary focus-within:ring-2 focus-within:ring-primary/20 transition-all" *ngIf="activeTab === 'text'">
            <quill-editor [(ngModel)]="form.content" name="content" [modules]="quillModules" placeholder="Nội dung chi tiết (không bắt buộc)..." theme="snow" class="bg-surface-container-lowest text-on-surface"></quill-editor>
          </div>

          <!-- Media Drag Drop Tab -->
          <div *ngIf="activeTab === 'media'">
            <div class="border-2 border-dashed border-outline-variant/50 rounded-2xl p-12 flex flex-col items-center justify-center text-center cursor-pointer hover:bg-primary/5 hover:border-primary/50 transition-colors" [class.bg-primary/10]="isDragOver" [class.border-primary]="isDragOver" (dragover)="onDragOver($event)" (dragleave)="onDragLeave($event)" (drop)="onFileDrop($event)" (click)="fileInput.click()">
              <div class="w-16 h-16 rounded-full bg-surface-container-highest flex items-center justify-center text-primary mb-4 shadow-sm">
                <span class="material-symbols-outlined text-[32px]">cloud_upload</span>
              </div>
              <p class="font-bold text-on-surface">{{ isUploading ? 'Đang tải lên...' : 'Kéo thả phần nội dung đa phương tiện' }}</p>
              <p class="text-xs text-on-surface-variant font-medium mt-1">hoặc nhấn vào đây để duyệt file</p>
              <input type="file" #fileInput (change)="onFileSelected($event)" class="hidden" accept="image/*,video/*" multiple />
            </div>

            <!-- Preview Grid -->
            <div class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 gap-4 mt-6" *ngIf="uploadedMedia.length > 0">
              <div class="relative rounded-xl overflow-hidden border border-outline-variant/20 group aspect-square bg-surface-container" *ngFor="let m of uploadedMedia; let i = index">
                <img [src]="m.url" alt="preview" *ngIf="m.type.startsWith('image/')" class="w-full h-full object-cover">
                <video [src]="m.url" *ngIf="m.type.startsWith('video/')" class="w-full h-full object-cover" controls></video>
                
                <button type="button" class="absolute top-2 right-2 w-6 h-6 rounded-full bg-black/60 text-white flex items-center justify-center opacity-0 group-hover:opacity-100 transition-opacity" (click)="removeMedia(i)" title="Xoá">
                  <span class="material-symbols-outlined text-[14px]">close</span>
                </button>
              </div>
            </div>
          </div>

          <!-- Link Tab -->
          <div *ngIf="activeTab === 'link'">
            <input type="url" placeholder="Dán liên kết (URL)" class="w-full bg-surface-container border border-outline-variant/20 focus:border-primary focus:ring-2 focus:ring-primary/20 rounded-xl px-4 py-3 font-bold text-on-surface outline-none transition-all" [(ngModel)]="form.content" name="linkContent" />
          </div>

        </div>
        
        <!-- Footer Buttons -->
        <div class="px-6 py-4 bg-surface-container/30 border-t border-outline-variant/15 flex justify-end gap-4">
          <button type="button" class="px-6 py-2.5 rounded-full font-bold text-sm tracking-wide text-on-surface-variant hover:bg-surface-container transition-colors uppercase" routerLink="/">Lưu bản nháp</button>
          <button type="submit" class="px-8 py-2.5 rounded-full font-bold text-sm tracking-wide transition-all uppercase disabled:opacity-50 disabled:cursor-not-allowed" [class.kinetic-gradient]="isFormReady()" [class.text-white]="isFormReady()" [class.bg-surface-container-highest]="!isFormReady()" [class.text-on-surface-variant]="!isFormReady()" [disabled]="!isFormReady()">Đăng bài</button>
        </div>

      </div>
    </form>
  </div>
</div>
